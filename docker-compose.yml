services:
  # Development service
  app-dev:
    container_name: news-aggregator-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env.development
    environment:
      - NODE_ENV=development
    profiles:
      - dev

  # Production service
  app-prod:
    container_name: news-aggregator-prod
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - '8080:80'
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles:
      - prod
